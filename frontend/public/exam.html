<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm Bài Thi - EduExam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .question-card,
        .sidebar-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, .05);
            background: #fff;
            margin-bottom: 20px;
        }

        .answer-label {
            width: 100%;
            text-align: left;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            margin-bottom: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-check:checked+.answer-label {
            background-color: #e7f1ff;
            border-color: #0d6efd;
            color: #084298;
            font-weight: 500;
        }

        #timer-display {
            font-size: 2.2rem;
            font-weight: 700;
            color: #dc3545;
            text-align: center;
            padding: 15px 0;
            background: #fff3f3;
            border-radius: 8px;
            font-family: monospace;
        }

        .question-nav-btn {
            width: 42px;
            height: 42px;
            margin: 4px;
            border-radius: 8px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .question-nav-btn.answered {
            background-color: #198754;
            color: white;
            border-color: #198754;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-mortarboard-fill me-2"></i>EduExam</a>
            <div class="text-white d-none d-md-block" id="user-info">Đang tải thông tin...</div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row flex-column-reverse flex-lg-row">
            <div class="col-lg-8" id="questions-container">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Đang tải đề thi từ hệ thống...</p>
                </div>
            </div>

            <div class="col-lg-4 mb-4">
                <div class="card sidebar-card p-4 sticky-top" style="top: 80px;">
                    <h6 class="text-uppercase text-secondary fw-bold mb-3">Thời gian còn lại</h6>
                    <div id="timer-display">45:00</div>
                    <hr class="opacity-25 my-4">
                    <h6 class="text-uppercase text-secondary fw-bold mb-3">Tiến độ làm bài</h6>
                    <div class="d-flex flex-wrap mb-4" id="question-navigator">
                    </div>
                    <button class="btn btn-primary btn-lg w-100 fw-bold shadow" onclick="submitExam()">
                        <i class="bi bi-send-check-fill me-2"></i> Nộp bài ngay
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="spinner-border text-primary mb-4"></div>
        <h3 class="text-primary fw-bold">Đang chấm điểm...</h3>
        <p class="text-muted">Vui lòng đợi trong giây lát</p>
    </div>

    <script>
        let questions = [];
        let selectedAnswers = {};
        const EXAM_ID = 1; // Đề thi mẫu

        // 1. Tải đề thi từ Backend
        async function loadExam() {
            try {
                const res = await fetch(`http://127.0.0.1:8000/exams/${EXAM_ID}`);
                if (!res.ok) throw new Error("Không lấy được đề thi");
                const data = await res.ok ? await res.json() : null;

                // Demo data nếu backend chưa up kịp
                questions = data?.questions || [
                    { id: 1, content: "Câu 1: 1+1 bằng mấy?", options: ["1", "2", "3", "4"] },
                    { id: 2, content: "Câu 2: Thủ đô Việt Nam?", options: ["HCM", "Hà Nội", "Đà Nẵng", "Huế"] }
                ];
                renderQuestions();
                renderNavigator();
            } catch (err) {
                console.error(err);
                document.getElementById('questions-container').innerHTML = `<div class="alert alert-danger">Lỗi kết nối Backend!</div>`;
            }
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = questions.map((q, idx) => `
                <div class="card question-card p-4" id="q${q.id}">
                    <h5 class="question-title">Câu ${idx + 1}: ${q.content}</h5>
                    <div class="answers">
                        ${q.options.map((opt, i) => `
                            <input type="radio" class="btn-check" name="q${q.id}" id="q${q.id}_${i}" 
                                   onchange="markAnswered(${q.id}, '${opt}')">
                            <label class="btn answer-label" for="q${q.id}_${i}">${String.fromCharCode(65 + i)}. ${opt}</label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderNavigator() {
            const nav = document.getElementById('question-navigator');
            nav.innerHTML = questions.map((q, idx) => `
                <a href="#q${q.id}" id="nav-q${q.id}" class="btn btn-outline-secondary question-nav-btn">${idx + 1}</a>
            `).join('');
        }

        function markAnswered(qId, val) {
            selectedAnswers[qId] = val;
            document.getElementById(`nav-q${qId}`).classList.add('answered');
        }

        // 2. Gửi bài thi và lấy kết quả thật
        async function submitExam() {
            if (!confirm("Mày chắc chắn muốn nộp bài chứ?")) return;

            document.getElementById('loading-overlay').style.display = 'flex';

            const payload = Object.keys(selectedAnswers).map(id => ({
                question_id: parseInt(id),
                answer: selectedAnswers[id]
            }));

            try {
                const res = await fetch(`http://127.0.0.1:8000/exams/${EXAM_ID}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await res.json();
                // Lưu kết quả thật để trang result.html xài
                localStorage.setItem('lastExamResult', JSON.stringify(result));

                setTimeout(() => {
                    window.location.href = 'result.html';
                }, 1500);

            } catch (err) {
                alert("Lỗi nộp bài! Kiểm tra lại Backend.");
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        window.onload = loadExam;
    </script>
    <script src="timer.js"></script>
</body>

</html>
