<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Bài Thi</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            box-shadow: 0 2px 4px rgba(0, 0, 0, .08);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .result-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            background: #fff;
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }
        
        .result-header {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .score-highlight {
            font-size: 4.5rem;
            font-weight: 800;
            line-height: 1;
            margin: 1rem 0;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.15);
        }
        
        .score-total {
            font-size: 2rem;
            opacity: 0.8;
            font-weight: 600;
            margin-left: -5px;
        }

        .chart-container {
            position: relative;
            height: 280px;
            width: 100%;
            margin: 1.5rem auto 2.5rem;
            display: flex;
            justify-content: center;
        }

        .action-btns .btn {
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .action-btns .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold mb-0 h1" href="#"><i class="bi bi-mortarboard-fill me-2"></i>EduExam</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item me-4">
                        <span class="nav-link active text-white"><i class="bi bi-book me-1"></i> Môn thi: Lập trình Web Frontend</span>
                    </li>
                    <li class="nav-item">
                        <div class="d-flex align-items-center text-white bg-white bg-opacity-25 px-3 py-1 rounded-pill">
                            <i class="bi bi-person-circle me-2 fs-5"></i>
                            <span class="fw-medium">Nguyễn Văn A (MSSV: 2024001)</span>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="card result-card">
            <!-- Header Result -->
            <div class="result-header">
                <i class="bi bi-patch-check-fill text-warning mb-3" style="font-size: 4rem;"></i>
                <h2 class="fw-bold mb-2">Hoàn thành bài thi!</h2>
                <p class="mb-0 text-white-50 fs-5">Hệ thống đã ghi nhận kết quả thành công.</p>
                <div class="score-highlight d-inline-block">
                    8.5<span class="score-total">/10</span>
                </div>
                <div class="mt-2 text-white opacity-75 fw-medium">
                    <i class="bi bi-star-fill text-warning"></i> 
                    <i class="bi bi-star-fill text-warning"></i> 
                    <i class="bi bi-star-fill text-warning"></i> 
                    <i class="bi bi-star-fill text-warning"></i> 
                    <i class="bi bi-star-half text-warning"></i>
                    <span class="ms-2">Xuất sắc!</span>
                </div>
            </div>
            
            <!-- Body Result -->
            <div class="card-body p-4 p-md-5">
                <h5 class="text-center text-secondary text-uppercase fw-bold mb-4 tracking-wide">Thống Kê Chi Tiết</h5>
                
                <!-- Chart Container -->
                <div class="chart-container">
                    <canvas id="resultChart"></canvas>
                </div>

                <!-- Number Summaries -->
                <div class="row text-center mb-5 gx-3">
                    <div class="col-6">
                        <div class="bg-success bg-opacity-10 rounded p-3 h-100 border border-success border-opacity-25">
                            <h3 class="text-success fw-bold mb-1">34</h3>
                            <span class="text-secondary small text-uppercase fw-bold">Câu Đúng</span>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="bg-danger bg-opacity-10 rounded p-3 h-100 border border-danger border-opacity-25">
                            <h3 class="text-danger fw-bold mb-1">6</h3>
                            <span class="text-secondary small text-uppercase fw-bold">Sai / Chưa Làm</span>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-btns d-flex flex-column flex-sm-row gap-3">
                    <button class="btn btn-outline-secondary btn-lg flex-fill fw-bold border-2" onclick="alert('Tính năng xem lại bài làm đang được phát triển.')">
                        <i class="bi bi-search me-2"></i> Xem lại bài làm
                    </button>
                    <a href="/" class="btn btn-primary btn-lg flex-fill fw-bold shadow">
                        <i class="bi bi-house-door-fill me-2"></i> Về trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Chart JS Init -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const ctx = document.getElementById('resultChart').getContext('2d');
            
            const data = {
                labels: ['Câu đúng', 'Sai / Bỏ qua'],
                datasets: [{
                    data: [34, 6],
                    backgroundColor: [
                        '#198754', // Xanh dương (Success)
                        '#dc3545'  // Đỏ (Danger)
                    ],
                    borderWidth: 2,
                    borderColor: '#ffffff',
                    hoverOffset: 6
                }]
            };

            const config = {
                type: 'doughnut',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%', // Tạo vành khuyên mỏng đẹp và hiện đại
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 25,
                                font: {
                                    size: 15,
                                    family: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif",
                                    weight: '600'
                                },
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(33, 37, 41, 0.9)',
                            padding: 14,
                            cornerRadius: 8,
                            titleFont: {
                                size: 14,
                                family: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
                            },
                            bodyFont: {
                                size: 15,
                                weight: 'bold',
                                family: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
                            },
                            callbacks: {
                                label: function(context) {
                                    return ` ${context.label}: ${context.raw} câu`;
                                }
                            }
                        }
                    },
                    animation: {
                        animateScale: true,
                        animateRotate: true,
                        duration: 1500
                    }
                }
            };

            new Chart(ctx, config);
        });
    </script>
</body>
</html>
